<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Управление соревнованиями</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">← В меню</a>
                <h2 class="h3 mb-0">Управление соревнованиями</h2>
                <a href="{% url 'create_competition' %}" class="btn btn-success">+ Создать соревнование</a>
            </div>
            <div class="card shadow-sm p-3">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Название</th>
                            <th>Дата начала</th>
                            <th>Тип</th>
                            <th>Статус</th>
                            <th class="text-end">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for comp in competitions %}
                            <tr>
                                <td><strong>{{ comp.title }}</strong></td>
                                <td>{{ comp.start_date }}</td>
                                <td><span class="badge bg-secondary">{{ comp.type.type_name }}</span></td>
                                <td><span class="badge bg-info">{{ comp.status }}</span></td>
                                <td class="text-end">
                                    <a href="{% url 'manage_stages' comp.id %}"
                                       class="btn btn-sm btn-primary shadow-sm px-3 me-1">Управление ⚙️</a>
                                    <a href="{% url 'toggle_archive' comp.id %}"
                                       class="btn btn-sm btn-outline-warning shadow-sm me-1"
                                       onclick="return confirm('Отправить соревнование в архив? Оно будет заморожено для судей.');">
                                        В архив 📦
                                    </a>
                                    <a href="{% url 'delete_competition' comp.id %}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('ВНИМАНИЕ! Удаление соревнования приведет к удалению всех его этапов, участников и результатов! Вы уверены?');">
                                        🗑️
                                    </a>
                                </td>
                            </tr>
                        {% empty %}
                            <tr>
                                <td colspan="5" class="text-center text-muted py-4">Соревнований пока не создано.</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
