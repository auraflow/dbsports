{% load static %}
<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords"
              content="спорт, соревнования, учет, результаты, турнирная таблица, судейство, организатор, главный судья">
        <meta name="description"
              content="Автоматизированная система учета спортивных соревнований">
        <title>{% block title %}Спортивный Учет{% endblock title %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
              rel="stylesheet">
        <link rel="stylesheet" href="{% static "css/style.css" %}">
    </head>
    <body class="{% block body_class %}gruvbox-theme{% endblock body_class %}">
        {% include "competitions/components/navbar.html" %}
        <main class="container mt-4 mb-4">
            {% block content %}
            {% endblock content %}
        </main>
        {% include "competitions/components/footer.html" %}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
