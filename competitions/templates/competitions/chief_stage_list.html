<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Панель контроля результатов</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container py-4" style="max-width: 700px;">
            <a href="{% url 'dashboard' %}"
               class="btn btn-sm btn-outline-secondary mb-3">← В главное меню</a>
            <div class="card shadow-sm p-4 bg-white rounded">
                <h2 class="h4 mb-3 text-center text-warning">Мониторинг и верификация данных</h2>
                <p class="text-muted small text-center">Выберите этап соревнований для проверки корректности судейских записей</p>
                <div class="list-group mt-3">
                    {% for stage in stages %}
                        <a href="{% url 'stage_verify_panel' stage.id %}"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                            <div>
                                <strong class="text-secondary d-block" style="font-size: 0.85rem;">{{ stage.competition.title }}</strong>
                                <span class="fw-bold">{{ stage.name }}</span>
                            </div>
                            <span class="badge bg-warning text-dark rounded-pill">Проверить →</span>
                        </a>
                    {% empty %}
                        <div class="text-center py-3 text-muted">Доступных этапов для проверки не найдено.</div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </body>
</html>
