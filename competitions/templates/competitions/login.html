<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Вход - Система учета результатов</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
    </head>
    <body class="bg-light d-flex align-items-center py-4"
          style="height: 100vh">
        <main class="form-signin w-100 m-auto" style="max-width: 400px;">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4 text-primary">СпортУчет</h2>
                    <p class="text-center text-muted mb-4">Авторизуйтесь для доступа к системе</p>
                    <form method="post">
                        {% csrf_token %}
                        {% if form.errors %}
                            <div class="alert alert-danger p-2 text-center" role="alert">Неверный логин или пароль.</div>
                        {% endif %}
                        <div class="form-floating mb-3">
                            <input type="text"
                                   class="form-control"
                                   id="id_username"
                                   name="username"
                                   placeholder="Логин"
                                   required>
                            <label for="id_username">Имя пользователя (Логин)</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password"
                                   class="form-control"
                                   id="id_password"
                                   name="password"
                                   placeholder="Пароль"
                                   required>
                            <label for="id_password">Пароль</label>
                        </div>
                        <button class="w-100 btn btn-lg btn-primary" type="submit">Войти в систему</button>
                    </form>
                </div>
            </div>
        </main>
    </body>
</html>
